name: Build GeoTrinity (Custom)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to build
        required: true
        default: master
      config:
        description: Build configuration
        required: true
        default: Development
        type: choice
        options:
          - Development
          - DebugGame
          - Test
          - Shipping
      build_server:
        description: Also build dedicated server
        required: false
        default: false
        type: boolean
      clean:
        description: Clean build (wipe Binaries, Intermediate and cook cache)
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      config:
        required: false
        default: Development
        type: string
      build_server:
        required: false
        default: false
        type: boolean
      clean:
        required: false
        default: false
        type: boolean

# No machine-specific paths live in this file, so it runs on any runner:
#   * the repo is wherever GitHub checks it out ($env:GITHUB_WORKSPACE), and
#   * the engine is resolved from the .uproject's EngineAssociation by Tools\Resolve-Engine.ps1.
# To pin a specific engine, set the repo variable UE_ROOT (Settings -> Secrets and variables -> Actions).

jobs:
  build:
    name: Build ${{ inputs.branch }} (${{ inputs.config }})
    runs-on: self-hosted
    timeout-minutes: 480

    steps:
      - name: Notify start
        shell: powershell -ExecutionPolicy Bypass -File "{0}"
        run: |
          $time   = Get-Date -Format "HH:mm:ss"
          $branch = "${{ inputs.branch }}"
          $config = "${{ inputs.config }}"
          $server = if ("${{ inputs.build_server }}" -eq "true") { " +Server" } else { "" }
          $clean  = if ("${{ inputs.clean }}"        -eq "true") { " +Clean"  } else { "" }
          $msg = "GeoTrinity Build! $time - $branch - $config$server$clean"
          try { msg * /TIME:120 $msg } catch {}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          # clean: false keeps Binaries/Intermediate/DerivedDataCache (all gitignored) between runs so
          # builds stay incremental. The default, clean: true, runs `git clean -ffdx` and would wipe
          # them, turning every run into a 1-3 hour full rebuild.
          clean: false

      # Must run after Checkout so Tools\Resolve-Engine.ps1 is at the branch's version.
      - name: Resolve engine
        shell: powershell -ExecutionPolicy Bypass -File "{0}"
        run: |
          # NB: do not name this $args -- that is a PowerShell automatic variable.
          $resolveArgs = @{}
          $override = "${{ vars.UE_ROOT }}"
          if ($override) {
            Write-Host "Engine override from repo variable UE_ROOT: $override"
            $resolveArgs.Override = $override
          }
          $ue = & "$env:GITHUB_WORKSPACE\Tools\Resolve-Engine.ps1" @resolveArgs -Verbose
          if (-not $ue) { throw "Resolve-Engine.ps1 returned nothing." }
          Write-Host "Resolved engine: $ue"
          "UE=$ue" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Clean (optional)
        if: ${{ inputs.clean == true }}
        shell: powershell -ExecutionPolicy Bypass -File "{0}"
        run: |
          cmd /c "$env:GITHUB_WORKSPACE\Tools\Clean.bat"

      - name: Package Client
        shell: powershell -ExecutionPolicy Bypass -File "{0}"
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
          $branch = "${{ inputs.branch }}" -replace "[/\\]", "-"
          $config = "${{ inputs.config }}"
          $archiveDir = "$env:GITHUB_WORKSPACE\Build\GeoTrinity_${branch}_${config}_$timestamp"
          & "$env:UE\Engine\Build\BatchFiles\RunUAT.bat" BuildCookRun `
            -project="$env:GITHUB_WORKSPACE\GeoTrinity.uproject" `
            -noP4 -platform=Win64 "-clientconfig=$config" `
            -cook -build -stage -pak -archive `
            "-archivedirectory=$archiveDir"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Move-Item "$archiveDir\Windows\*" "$archiveDir\\"
          Remove-Item "$archiveDir\Windows" -ErrorAction SilentlyContinue
          echo "ARCHIVE_DIR=$archiveDir" >> $env:GITHUB_ENV
        env:
          UE_IgnoreOutdatedImportedLibraries: 1

      - name: Package Server
        if: ${{ inputs.build_server == true }}
        shell: powershell -ExecutionPolicy Bypass -File "{0}"
        run: |
          $config = "${{ inputs.config }}"
          & "$env:UE\Engine\Build\BatchFiles\RunUAT.bat" BuildCookRun `
            -project="$env:GITHUB_WORKSPACE\GeoTrinity.uproject" `
            -noP4 -platform=Win64 "-serverconfig=$config" `
            -noclient -server `
            -cook -build -stage -pak -archive `
            "-archivedirectory=$env:ARCHIVE_DIR"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Rename-Item "$env:ARCHIVE_DIR\WindowsServer" "Server"
        env:
          UE_IgnoreOutdatedImportedLibraries: 1

      - name: Notify done
        if: success()
        shell: powershell -ExecutionPolicy Bypass -File "{0}"
        run: |
          try { msg * /TIME:120 "GeoTrinity Build Done! $env:ARCHIVE_DIR" } catch {}

      - name: Notify failed
        if: failure()
        shell: powershell -ExecutionPolicy Bypass -File "{0}"
        run: |
          try { msg * /TIME:120 "GeoTrinity Build FAILED! Check GitHub Actions." } catch {}
