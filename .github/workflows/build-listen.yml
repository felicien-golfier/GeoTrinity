name: Build GeoTrinity (Listen Server)

on:
  push:
    branches: [build-listen]
  workflow_dispatch:

jobs:
  build:
    name: Build Listen Server (Game target)
    runs-on: self-hosted
    timeout-minutes: 480

    steps:
      - name: Sync build-listen
        shell: powershell -ExecutionPolicy Bypass -File "{0}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $token = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$env:GITHUB_TOKEN"))
          $env:GIT_TERMINAL_PROMPT = "0"
          $git = "C:\Program Files\Git\cmd\git.exe"
          & $git -C "H:\Work\Git\GeoTrinity" -c "credential.helper=" -c "http.https://github.com/.extraheader=Authorization: Basic $token" fetch origin build-listen
          & $git -C "H:\Work\Git\GeoTrinity" checkout build-listen
          & $git -C "H:\Work\Git\GeoTrinity" reset --hard FETCH_HEAD

      - name: Build Game (GeoTrinity Win64 Development)
        shell: cmd
        run: |
          "H:\Epic\UE_5.7\Engine\Build\BatchFiles\Build.bat" ^
            GeoTrinity Win64 Development ^
            "H:\Work\Git\GeoTrinity\GeoTrinity.uproject" ^
            -NoMutex -NoHotReloadFromIDE
        env:
          UE_IgnoreOutdatedImportedLibraries: 1
