name: Build GeoTrinity (Listen Server)

on:
  push:
    branches: [build-listen]
  workflow_dispatch:

jobs:
  build:
    name: Build Listen Server (Game target)
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Game (GeoTrinity Win64 Development)
        shell: cmd
        run: |
          "C:\Program Files\Epic Games\UE_5.7\Engine\Build\BatchFiles\Build.bat" ^
            GeoTrinity Win64 Development ^
            "${{ github.workspace }}\GeoTrinity.uproject" ^
            -WaitMutex -NoHotReloadFromIDE
        env:
          UE_IgnoreOutdatedImportedLibraries: 1
